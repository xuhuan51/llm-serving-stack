apiVersion: v1
kind: Pod
metadata:
  name: vllm-qwen-k8s
  labels:
    app: vllm
spec:
  containers:
    - name: vllm
      image: vllm/vllm-openai:latest
      args:
        - "--model"
        - "/models/Qwen2.5-7B-Instruct-AWQ"
        - "--quantization"
        - "awq"
        - "--port"
        - "8000"
        - "--gpu-memory-utilization"
        - "0.85"
        - "--max-model-len"
        - "4096"
      ports:
        - containerPort: 8000
      resources:
        limits:
          nvidia.com/gpu: 1
      volumeMounts:
        - name: models
          mountPath: /models
          readOnly: true
        - name: dshm
          mountPath: /dev/shm
  volumes:
    - name: models
      hostPath:
        path: /home/liuguangli/models
        type: Directory
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-svc
spec:
  type: NodePort
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
